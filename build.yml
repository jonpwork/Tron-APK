name: Build Tron APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Gerar keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Tron MP4, OU=App, O=jonpwork, L=BR, S=BR, C=BR"

      - name: Gerar projeto com bubblewrap
        run: bubblewrap init --manifest twa-manifest.json
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android123
          BUBBLEWRAP_KEY_PASSWORD: android123

      - name: Corrigir app/build.gradle (bug enableNotifications)
        run: |
          python3 - <<'EOF'
          import re

          path = "app/build.gradle"
          with open(path, "r") as f:
              content = f.read()

          fixed = re.sub(
              r'enableNotifications:\s*,',
              'enableNotifications: false,',
              content
          )

          with open(path, "w") as f:
              f.write(fixed)

          lines = fixed.splitlines()
          print("=== Linhas 33-40 do app/build.gradle após correção ===")
          for i, line in enumerate(lines[32:40], start=33):
              print(f"{i}: {line}")
          EOF

      - name: Atualizar Gradle wrapper para versão compatível
        run: ./gradlew wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Build APK (release)
        run: bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android123
          BUBBLEWRAP_KEY_PASSWORD: android123

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v3
        with:
          name: tron-mp4-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
