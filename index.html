<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>TRON Conversor MP4</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#000a1a"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --neon:#00d4ff;--neon2:#0080ff;--neon3:#00ffcc;--pink:#ff00aa;--gold:#ffd700;
  --bg:#000a1a;--card:rgba(0,15,40,0.90);
  --glow:0 0 20px rgba(0,212,255,0.7),0 0 60px rgba(0,212,255,0.25);
  --glow-sm:0 0 10px rgba(0,212,255,0.5);
  --font:'Orbitron',monospace;--mono:'Share Tech Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--neon);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;animation:gridPulse 8s ease-in-out infinite;}
@keyframes gridPulse{0%,100%{opacity:.5;}50%{opacity:1;}}

header{position:relative;z-index:10;text-align:center;padding:28px 16px 0;}
.logo-kicker{font-family:var(--mono);font-size:clamp(8px,2vw,11px);letter-spacing:.5em;color:rgba(0,212,255,0.45);text-transform:uppercase;margin-bottom:6px;}
.logo{font-size:clamp(32px,8.5vw,52px);font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:var(--neon);text-shadow:var(--glow);position:relative;display:inline-block;line-height:1;}
.logo-tagline{font-family:var(--mono);font-size:clamp(9px,2.2vw,13px);letter-spacing:.35em;color:rgba(0,212,255,0.5);text-transform:uppercase;margin-top:5px;}
.logo-tagline span{color:var(--neon3);text-shadow:0 0 10px rgba(0,255,200,0.5);}
.logo-line{width:min(85%,360px);height:1px;margin:10px auto 0;background:linear-gradient(90deg,transparent,var(--neon),var(--neon3),var(--neon),transparent);box-shadow:0 0 10px rgba(0,212,255,0.4);}

.arena{position:relative;z-index:5;width:min(92vw,480px);aspect-ratio:1;margin:22px auto 0;}
.ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,212,255,0.1);animation:ringPulse 3s ease-in-out infinite;}
@keyframes ringPulse{0%,100%{border-color:rgba(0,212,255,0.08);}50%{border-color:rgba(0,212,255,0.38);box-shadow:0 0 30px rgba(0,212,255,0.08);}}
.connector-svg{position:absolute;inset:0;pointer-events:none;z-index:8;}
.conn-line{stroke:rgba(0,212,255,0.13);stroke-width:1;stroke-dasharray:4 6;fill:none;animation:dashAnim 3s linear infinite;}
@keyframes dashAnim{to{stroke-dashoffset:-40;}}
#elecGlobal{position:fixed;inset:0;z-index:6;pointer-events:none;}
#orbitalCv{position:absolute;inset:0;z-index:7;pointer-events:none;width:100%;height:100%;}

.card{
  position:absolute;z-index:15;width:clamp(100px,24%,122px);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:var(--card);backdrop-filter:blur(18px);display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:22px 12px 16px;transition:transform .2s;aspect-ratio:1/.866;
}
.card[data-pos="top"]  {top:-4%;left:50%;transform:translateX(-50%);}
.card[data-pos="right"]{top:50%;right:-5%;transform:translateY(-50%);}
.card[data-pos="bot"]  {bottom:-4%;left:50%;transform:translateX(-50%);}
.card[data-pos="left"] {top:50%;left:-5%;transform:translateY(-50%);}

.card-section{font-size:clamp(10px,3vw,14px);letter-spacing:.12em;color:var(--neon);text-transform:uppercase;margin-bottom:6px;font-family:var(--font);font-weight:700;text-shadow:var(--glow-sm);}
.card-options{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;}
.opt{font-family:var(--mono);font-size:clamp(6px,1.6vw,8px);padding:2px 5px;border-radius:3px;border:1px solid rgba(0,212,255,0.18);color:rgba(0,212,255,0.65);cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none;}
.opt:hover,.opt.sel{background:rgba(0,212,255,0.14);border-color:var(--neon);color:var(--neon);box-shadow:var(--glow-sm);}
.opt.sel{font-weight:700;}

.upload-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:42px;border:1px dashed rgba(0,212,255,0.18);border-radius:4px;font-family:var(--mono);font-size:7px;color:rgba(0,212,255,0.4);cursor:pointer;transition:all .2s;padding:5px 4px;text-align:center;width:100%;}
.upload-zone.has-file{border-color:var(--neon3);color:var(--neon3);background:rgba(0,255,200,0.04);}
.transcribe-btn{width:100%;padding:4px 3px;background:transparent;border:1px solid rgba(255,0,170,0.35);border-radius:4px;color:var(--pink);font-family:var(--font);font-size:6.5px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s;text-transform:uppercase;margin-top:4px;}
.transcribe-btn:hover{background:rgba(255,0,170,0.1);border-color:var(--pink);box-shadow:0 0 12px rgba(255,0,170,0.4);}
.leg-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(0,212,255,0.25);color:var(--neon);font-family:var(--mono);font-size:8px;padding:2px 0;outline:none;margin-top:3px;text-align:center;}

.center-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 35% 35%,#002244,#000a1a);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;z-index:20;user-select:none;transition:transform .15s;}
.center-label{font-size:clamp(5px,1.4vw,8px);font-weight:700;letter-spacing:.12em;text-align:center;line-height:1.3;color:var(--neon);text-shadow:var(--glow-sm);white-space:pre-line;}

.status-bar{position:relative;z-index:10;margin:16px auto 0;width:min(92vw,480px);display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(0,10,30,0.8);border:1px solid rgba(0,212,255,0.08);border-radius:8px;font-family:var(--mono);font-size:10px;color:rgba(0,212,255,0.5);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--neon3);box-shadow:0 0 8px var(--neon3);flex-shrink:0;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.progress-bar{display:none;width:100%;height:3px;background:rgba(0,212,255,0.08);border-radius:2px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--neon2),var(--neon),var(--neon3));border-radius:2px;transition:width .4s ease;box-shadow:0 0 10px var(--neon);}

.transcription-box{position:relative;z-index:10;width:min(92vw,480px);margin:14px auto 0;background:rgba(0,10,30,0.92);border:1px solid rgba(0,212,255,0.25);border-radius:12px;overflow:hidden;display:none;}
.transcription-box.visible{display:block;}
.transcription-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(0,212,255,0.12);}
.transcription-label{font-family:var(--mono);font-size:10px;letter-spacing:.25em;color:rgba(0,212,255,0.6);text-transform:uppercase;}
.copy-btn{font-family:var(--mono);font-size:9px;padding:4px 12px;background:transparent;border:1px solid rgba(0,212,255,0.35);border-radius:6px;color:var(--neon);cursor:pointer;letter-spacing:.1em;transition:all .2s;}
.transcription-text{font-family:var(--mono);font-size:11px;line-height:1.65;color:rgba(0,212,255,0.85);padding:14px;max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(0,10,30,.95);border:1px solid var(--neon);border-radius:8px;padding:10px 20px;font-family:var(--mono);font-size:11px;color:var(--neon);box-shadow:var(--glow);transition:transform .3s;z-index:1000;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="grid-bg"></div>
<header>
  <div class="logo-kicker">▸ Áudio + Imagem = Vídeo ◂</div>
  <div class="logo">TRON</div>
  <div class="logo-tagline">Conversor <span>MP4</span></div>
  <div class="logo-line"></div>
</header>

<input type="file" id="fileImg" accept="image/*" style="display:none"/>
<input type="file" id="fileAud" accept="audio/*,video/*" style="display:none"/>

<div class="arena" id="arena">
  <div class="ring"></div>
  <canvas id="orbitalCv"></canvas>
  <svg class="connector-svg" id="connSvg" viewBox="0 0 480 480"></svg>

  <div class="card" data-pos="top" id="cardImg">
    <div class="card-section">01 · Imagem</div>
    <div class="upload-zone" onclick="document.getElementById('fileImg').click()">
      <span id="zoneImgName">toque aqui</span>
    </div>
  </div>

  <div class="card" data-pos="right" id="cardAud">
    <div class="card-section">02 · Áudio</div>
    <div class="upload-zone" onclick="document.getElementById('fileAud').click()">
      <span id="zoneAudName">toque aqui</span>
    </div>
  </div>

  <div class="card" data-pos="bot" id="cardLeg">
    <div class="card-section">03 · Legenda</div>
    <div class="card-options">
      <div class="opt sel" data-group="leg" data-val="nenhuma">Off</div>
      <div class="opt" data-group="leg" data-val="auto">Auto</div>
      <div class="opt" data-group="leg" data-val="estatica">Fixo</div>
    </div>
    <input class="leg-input" id="legInput" placeholder="texto..." style="display:none"/>
    <div id="transcribeArea" style="display:none;">
      <button class="transcribe-btn" id="btnTranscrever">⚡ Transcrever</button>
    </div>
  </div>

  <div class="card" data-pos="left" id="cardRes">
    <div class="card-section">04 · Resolução</div>
    <div class="card-options">
      <div class="opt sel" data-group="res" data-val="720x1280">TikTok</div>
      <div class="opt" data-group="res" data-val="1080x1080">Instagram</div>
    </div>
  </div>

  <div class="center-btn" id="btnGerar" onclick="gerarVideo()">
    <div class="center-label" id="centerLabel">GERAR\nVÍDEO</div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <div id="status-msg">Sistema pronto</div>
  <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="transcription-box" id="transcriptionBox">
  <div class="transcription-header">
    <div class="transcription-label">⚡ Transcrição</div>
    <button class="copy-btn" id="copyBtn" onclick="copyTranscription()">Copiar</button>
  </div>
  <div class="transcription-text" id="transcriptionText"></div>
  
  <div style="margin-top: 10px; text-align: center;">
    <button class="transcribe-btn" id="btnGerarPrompt" onclick="gerarPromptImagem()">Gerar Prompt de Imagem</button>
  </div>
  <div id="promptArea" style="display:none; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; border: 1px dashed var(--neon3);">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
      <span style="font-family: var(--font); font-size: 8px; color: var(--neon3); font-weight: 700; text-transform: uppercase;">Prompt Gerado:</span>
      <button class="copy-btn" id="copyPromptBtn" onclick="copyPrompt()">Copiar</button>
    </div>
    <div id="promptText" style="font-family: var(--mono); font-size: 8px; color: #fff; word-break: break-all; text-align: left;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state={imgFile:null,audFile:null,resolucao:'720x1280',modoLeg:'nenhuma',legTxt:'',palavras:[],segmentos:[],converting:false};

document.querySelectorAll('.opt').forEach(el=>{
  el.addEventListener('click',()=>{
    const g=el.dataset.group;
    document.querySelectorAll(`.opt[data-group="${g}"]`).forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    if(g==='res')state.resolucao=el.dataset.val;
    if(g==='leg'){
      state.modoLeg=el.dataset.val;
      document.getElementById('legInput').style.display=state.modoLeg==='estatica'?'block':'none';
      document.getElementById('transcribeArea').style.display=state.modoLeg==='auto'?'block':'none';
    }
  });
});

document.getElementById('fileImg').addEventListener('change',e=>{const f=e.target.files[0]; if(f){state.imgFile=f; document.getElementById('zoneImgName').textContent=f.name;}});
document.getElementById('fileAud').addEventListener('change',e=>{const f=e.target.files[0]; if(f){state.audFile=f; document.getElementById('zoneAudName').textContent=f.name;}});

document.getElementById('btnTranscrever').addEventListener('click',async()=>{
  if(!state.audFile)return;
  const fd=new FormData(); fd.append('audio',state.audFile);
  try{
    const r=await fetch('/transcrever',{method:'POST',body:fd});
    const d=await r.json();
    if(!d.erro){
      state.palavras=d.palavras; state.segmentos=d.segmentos;
      document.getElementById('transcriptionText').textContent=d.texto;
      document.getElementById('transcriptionBox').classList.add('visible');
    }
  }catch(e){}
});

async function gerarPromptImagem() {
  const txt = document.getElementById('transcriptionText').textContent;
  if (!txt) return;
  const btn = document.getElementById('btnGerarPrompt'); btn.textContent = '⏳...';
  try {
    const res = await fetch('/gerar-prompt', {method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ texto: txt })});
    const data = await res.json();
    if (res.ok) { document.getElementById('promptArea').style.display = 'block'; document.getElementById('promptText').textContent = data.prompt;}
  } catch (e) {}
  btn.textContent = 'Gerar Prompt de Imagem';
}

function copyTranscription(){
  navigator.clipboard.writeText(document.getElementById('transcriptionText').textContent);
  toast('Copiado!');
}
function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('promptText').textContent);
  toast('Copiado!');
}

function setStatus(msg){document.getElementById('status-msg').textContent=msg;}
function toast(m, type=''){
  const t=document.getElementById('toast'); t.textContent=m; 
  t.className='toast show' + (type?' '+type:'');
  setTimeout(()=>t.classList.remove('show'),2000);
}

async function gerarVideo(){
  if(state.converting || !state.imgFile || !state.audFile)return;
  state.converting=true;
  
  document.getElementById('progressBar').style.display='block';
  document.getElementById('progressFill').style.width='50%';
  setStatus('Processando...');

  const fd=new FormData();
  fd.append('imagem',state.imgFile); fd.append('audio',state.audFile);
  fd.append('resolucao',state.resolucao); fd.append('modo_legenda',state.modoLeg);
  fd.append('legenda', document.getElementById('legInput').value);
  if(state.palavras.length) fd.append('palavras',JSON.stringify(state.palavras));
  try{
    const r=await fetch('/converter',{method:'POST',body:fd});
    if(r.ok){
      document.getElementById('progressFill').style.width='100%';
      const b=await r.blob(), u=URL.createObjectURL(b), a=document.createElement('a');
      a.href=u; a.download='video.mp4'; a.click();
      setStatus('Sucesso!');
      setTimeout(()=>{document.getElementById('progressBar').style.display='none'; document.getElementById('progressFill').style.width='0%'; setStatus('Sistema pronto');}, 3000);
    } else {
      setStatus('Erro na conversão');
      document.getElementById('progressBar').style.display='none';
    }
  }catch(e){
    setStatus('Erro de conexão');
    document.getElementById('progressBar').style.display='none';
  }
  state.converting=false;
}
</script>
</body>
</html>
