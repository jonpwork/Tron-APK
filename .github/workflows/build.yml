name: Build APK - Tron MP4

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: |
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli

      - name: Pré-configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Gerar Keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Tron MP4, O=JonpWork, C=BR"

      - name: Acordar Render app
        run: |
          echo "Acordando o servidor..."
          curl -v https://tron-mp4-app.onrender.com/static/icons/icon-512.png -o /dev/null
          sleep 15
          echo "Servidor pronto!"

      - name: Build APK com expect
        run: |
          expect << 'EOF'
          set timeout 600
          log_user 1
          spawn bubblewrap build --skipPwaValidation
          expect {
            -re {[Rr]egenerate} { send "y\r"; exp_continue }
            -re {[Uu]pdate} { send "y\r"; exp_continue }
            -re {[Pp]assword} { send "android123\r"; exp_continue }
            -re {\?} { send "y\r"; exp_continue }
            eof
          }
          EOF

      - name: Listar todos os arquivos gerados
        run: |
          echo "=== APK/AAB ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null
          echo "=== Estrutura de pastas ==="
          find . -type d -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null

      - name: Upload APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: tron-mp4-release
          path: |
            **/*.apk
            **/*.aab
