name: Build APK - Tron MP4

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: |
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli

      - name: Pré-configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Gerar Keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Tron MP4, O=JonpWork, C=BR"

      - name: Gerar projeto com bubblewrap (ignora falha do Gradle)
        run: |
          expect << 'EOF' || true
          set timeout 300
          log_user 1
          spawn bubblewrap build --skipPwaValidation
          expect {
            -re {[Rr]egenerate} { send "y\r"; exp_continue }
            -re {[Uu]pdate} { send "y\r"; exp_continue }
            -re {[Pp]assword} { send "android123\r"; exp_continue }
            -re {\?} { send "y\r"; exp_continue }
            eof
          }
          EOF
          echo "Projeto gerado!"

      - name: Atualizar Gradle wrapper
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Compilar APK
        run: ./gradlew assembleRelease

      - name: Assinar APK
        run: |
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "APK: $APK"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner sign \
            --ks android.keystore \
            --ks-key-alias android \
            --ks-pass pass:android123 \
            --key-pass pass:android123 \
            "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tron-mp4-release
          path: "**/*.apk"
