name: Build Tron APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Acordar app no Render
        run: |
          curl -s --max-time 60 https://tron-mp4-app.onrender.com/ || true
          sleep 10

      - name: Gerar keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Tron MP4, OU=App, O=jonpwork, L=BR, S=BR, C=BR"

      - name: Pre-configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Gerar projeto com bubblewrap
        run: bubblewrap update
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android123
          BUBBLEWRAP_KEY_PASSWORD: android123

      - name: Listar arquivos gerados
        run: find . -maxdepth 3 -name "*.gradle" -o -name "gradlew" | head -20

      - name: Corrigir app/build.gradle
        run: |
          sed -i "s/enableNotifications: ,/enableNotifications: false,/g" app/build.gradle || true
          sed -i "s/enableNotifications:,/enableNotifications: false,/g" app/build.gradle || true
          sed -i "s/splashScreenFadeOutDuration: ,/splashScreenFadeOutDuration: 300,/g" app/build.gradle || true
          sed -i "s/splashScreenFadeOutDuration:,/splashScreenFadeOutDuration: 300,/g" app/build.gradle || true
          cat app/build.gradle | grep -E "enableNotifications|splashScreenFadeOutDuration" || true

      - name: Atualizar Gradle wrapper
        run: ./gradlew wrapper --gradle-version=8.4 --distribution-type=bin

      - name: Build APK
        run: bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android123
          BUBBLEWRAP_KEY_PASSWORD: android123

      - name: Verificar APK gerado
        run: find . -name "*.apk" -o -name "*.aab" | head -20

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: tron-mp4-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab
            
