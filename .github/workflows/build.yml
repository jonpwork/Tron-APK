name: Build APK - Tron MP4

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Gerar Keystore
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Tron MP4, O=JonpWork, C=BR"

      - name: Build APK
        run: |
          printf 'android123\nandroid123\n' | bubblewrap build --skipPwaValidation

      - name: Upload APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: tron-mp4-release
          path: app/build/outputs/
